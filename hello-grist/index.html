<!DOCTYPE html>
<html>
<head>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #projet { font-size: 1.4em; font-weight: bold; margin-bottom: 8px; }
    #statut { display: inline-block; padding: 4px 12px; border-radius: 12px; background: #e0e0e0; }
  </style>
</head>
<body>
  <div id="projet">En attente de sélection...</div>
  <div id="statut"></div>

  <script>
   grist.ready();

grist.onRecord(function(record) {
  // On affiche tout le record brut pour voir les vrais noms de champs
  document.getElementById('projet').textContent = JSON.stringify(record);
});
  </script>
</body>
</html>
